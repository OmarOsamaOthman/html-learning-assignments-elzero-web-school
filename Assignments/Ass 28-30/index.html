<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <form method="get">
            <div>
                <!-- <input id="to" name="token" type="hidden" value="b92f1fc2fce391ad7af633723afd3055"> -->
            </div>

            <div>
                <!-- <label for="em">Email</label><br> -->
                <!-- <input id="em" name="email" readonly value="o@o.com"> -->
                <!-- <br><br> -->
            </div>

            <div>
                <label for="us">Username</label><br>
                <input id="us" autofocus name="username" minlength="5" maxlength="20" required>
                <br><br>
            </div>



            <div>
                <h3>Choose your skills</h3>
                <div>
                    <input id="sk" type="checkbox" name="skills" checked>
                    <label for="sk">Problem Solving</label>
                </div>
                <div>
                    <input id="lt" type="checkbox" name="skills">
                    <label for="lt">Logical Thinking</label>
                </div>
                <div>
                    <input id="as" type="checkbox" name="skills">
                    <label for="as">Advanced Search</label>
                </div>
                <div>
                    <input id="ana" type="checkbox" name="skills">
                    <label for="ana">Analysis</label>
                </div>
                <div>
                    <input id="plan" type="checkbox" name="skills">
                    <label for="plan">Planning</label>
                </div>
            </div>

            <br><br>


            <h3>What is your Jop</h3>
            <div>
                <div>
                    <input id="fed" type="radio" name="job" required checked>
                    <label for="fed">Front-End Developer</label>
                </div>
                <div>
                    <input id="bed" type="radio" name="job" required>
                    <label for="bed">Back-End Developer</label>
                </div>
                <div>
                    <input id="ba" type="radio" name="job" required>
                    <label for="ba">Business Analyst</label>
                </div>
                <div>
                    <input id="pm" type="radio" name="job" required>
                    <label for="pm">Project Manager</label>
                </div>
                <div>
                    <input id="sm" type="radio" name="job" required>
                    <label for="sm">Scrum Master</label>
                </div>
            </div>

            <br><br>

            <div>
                <label for="lang">Choise language version</label>
                <select name="lang">
                    <optgroup label="PHP">
                        <option value="v5">v5.0</option>
                        <option value="v7">v7.0</option>
                        <option value="v8">v8.0</option>
                    </optgroup>
                    <optgroup label="Python">
                        <option value="v2">v2.0</option>
                        <option value="v3">v3.0</option>
                        <option value="v3.9">v3.9</option>
                    </optgroup>
                </select>
            </div>

            <br>

            <div>
                <textarea name="lern" cols="110" rows="10"
                    placeholder="Write here what you want to learn programing"></textarea>
            </div>


            <div>
                <br>
                <input type="submit" value="save">
                <input type="reset" value="Empty">
            </div>
        </form>
    </div>
</body>

</html>
